<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>¡Feliz Cumpleaños Eva!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cream:      #f0e8de;
      --champagne:  #ddc89a;
      --gold:       #c9a04a;
      --card-bg:    #f9f4ee;
    }

    html { scroll-behavior: smooth; }

    body {
      background: radial-gradient(ellipse 100% 70% at 50% 25%, #160e1c 0%, #080510 100%);
      color: var(--cream);
      font-family: 'Cormorant Garamond', Georgia, serif;
      overflow: hidden;
      height: 100svh;
      display: flex;
      flex-direction: column;
      -webkit-tap-highlight-color: transparent;
    }

    /* Grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.88' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
      z-index: 0;
    }

    /* Vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 120% 80% at 50% 20%, transparent 35%, rgba(5, 3, 8, 0.72) 100%);
      pointer-events: none;
      z-index: 0;
    }

    #confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      z-index: 2;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.6rem 1rem 0.5rem;
      text-align: center;
      gap: 0;
    }

    /* Gold rule */
    .hero-rule {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      width: min(280px, 72vw);
      margin-bottom: 0.55rem;
      opacity: 0;
      animation: riseIn 1s ease 0.15s both;
    }
    .hero-rule::before,
    .hero-rule::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold) 50%, transparent);
    }
    .hero-rule-diamond {
      width: 5px;
      height: 5px;
      background: var(--gold);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    /* "¡Feliz Cumpleaños!" */
    .hero-title {
      font-style: italic;
      font-weight: 300;
      font-size: clamp(0.95rem, 3.8vw, 1.9rem);
      letter-spacing: 0.06em;
      color: var(--champagne);
      line-height: 1;
      opacity: 0;
      animation: riseIn 1s ease 0.4s both;
    }

    /* EVA */
    .hero-name {
      font-style: italic;
      font-weight: 300;
      font-size: clamp(5.5rem, 24vw, 12rem);
      letter-spacing: 0.04em;
      line-height: 0.84;
      background: linear-gradient(
        108deg,
        var(--cream)     0%,
        var(--cream)     30%,
        var(--champagne) 42%,
        #fff5b0          50%,
        var(--champagne) 58%,
        var(--cream)     70%,
        var(--cream)     100%
      );
      background-size: 280% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      animation: riseIn 1s ease 0.7s both, shimmer 6s cubic-bezier(0.4, 0, 0.6, 1) infinite 2.2s;
    }

    /* Bottom rule */
    .hero-rule-bottom {
      margin-top: 0.6rem;
      opacity: 0;
      animation: riseIn 1s ease 1s both;
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes shimmer {
      0%   { background-position:  150% 0; }
      50%  { background-position: -150% 0; }
      100% { background-position:  150% 0; }
    }

    /* ── PHOTO GRID ── */
    #photo-grid {
      position: relative;
      z-index: 2;
      flex: 1 1 0;
      min-height: 0;
      width: 100%;
    }

    @keyframes photoIn {
      from { opacity: 0; transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(0.72); }
      to   { opacity: 1; transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(1); }
    }

    .photo-card {
      position: absolute;
      background: var(--card-bg);
      padding: 8px 8px 34px;
      width: var(--card-w);
      box-shadow:
        0 24px 64px rgba(0, 0, 0, 0.88),
        0 5px 16px rgba(0, 0, 0, 0.52);
      cursor: pointer;
      transform-origin: center center;
      transform: translate(var(--tx), var(--ty)) rotate(var(--rot));
      transition: transform 0.24s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.24s ease;
      will-change: transform;
      opacity: 0;
      animation: photoIn 0.5s ease forwards;
      animation-delay: var(--delay);
    }

    .photo-card:hover {
      transform: translate(var(--tx), var(--ty)) rotate(calc(var(--rot) * 0.2)) scale(1.1);
      box-shadow:
        0 36px 96px rgba(0, 0, 0, 0.92),
        0 0 48px rgba(201, 160, 74, 0.18),
        0 0 96px rgba(184, 76, 110, 0.1);
      z-index: 50 !important;
    }

    .photo-card:active {
      transform: translate(var(--tx), var(--ty)) rotate(calc(var(--rot) * 0.2)) scale(1.05);
      z-index: 50 !important;
    }

    .photo-card img {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      pointer-events: none;
    }

    /* ── LIGHTBOX ── */
    #lightbox {
      display: flex;
      position: fixed;
      inset: 0;
      background: rgba(8, 5, 12, 0.82);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 16px;
      backdrop-filter: blur(8px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
    }
    #lightbox.open { opacity: 1; pointer-events: auto; }
    #lightbox img {
      max-width: 100%;
      max-height: 90svh;
      object-fit: contain;
      box-shadow: 0 0 80px rgba(0, 0, 0, 0.96);
    }
    #lightbox-close {
      position: fixed;
      top: 18px;
      right: 22px;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 2rem;
      color: var(--champagne);
      cursor: pointer;
      line-height: 1;
      opacity: 0.55;
      transition: opacity 0.2s;
    }
    #lightbox-close:hover { opacity: 1; }
  </style>
</head>
<body>

<canvas id="confetti"></canvas>

<section class="hero">
  <div class="hero-rule"><div class="hero-rule-diamond"></div></div>
  <p class="hero-title">¡Feliz Cumpleaños!</p>
  <div class="hero-name">Eva</div>
  <div class="hero-rule hero-rule-bottom"><div class="hero-rule-diamond"></div></div>
</section>

<div id="photo-grid"></div>

<div id="lightbox">
  <span id="lightbox-close">&#x2715;</span>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
/* CONFETTI */
(function () {
  const cv = document.getElementById('confetti');
  const cx = cv.getContext('2d');
  const COLS = ['#b84c6e','#c9a04a','#ddc89a','#7a3f5e','#d4889a','#f0e8de','#9b5870','#e0b87a'];
  let W, H, pts = [];
  function resize() { W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  function mk(fromTop) {
    return {
      x: Math.random() * W, y: fromTop ? -12 : Math.random() * H,
      w: Math.random() * 7 + 3, h: Math.random() * 4 + 2,
      c: COLS[Math.random() * COLS.length | 0],
      vx: (Math.random() - .5) * 1.8, vy: Math.random() * 2 + 1,
      rot: Math.random() * 360, rv: (Math.random() - .5) * 5,
      wob: Math.random() * Math.PI * 2, wobS: Math.random() * .03 + .015,
      sh: Math.random() * 3 | 0, a: 1
    };
  }
  for (let i = 0; i < 90; i++) pts.push(mk(false));
  let f = 0;
  (function tick() {
    cx.clearRect(0, 0, W, H);
    if (++f % 4 === 0 && pts.length < 150) pts.push(mk(true));
    pts = pts.filter(p => {
      p.wob += p.wobS; p.x += p.vx + Math.sin(p.wob) * 0.9;
      p.y += p.vy; p.vy += .03; p.rot += p.rv;
      if (p.y > H * .8) p.a = Math.max(0, p.a - .02);
      return p.y < H + 20 && p.a > 0;
    });
    pts.forEach(p => {
      cx.save(); cx.globalAlpha = p.a;
      cx.translate(p.x, p.y); cx.rotate(p.rot * Math.PI / 180);
      cx.fillStyle = p.c;
      if (p.sh === 0) { cx.fillRect(-p.w/2, -p.h/2, p.w, p.h); }
      else if (p.sh === 1) { cx.beginPath(); cx.arc(0,0,p.w/2,0,Math.PI*2); cx.fill(); }
      else { cx.beginPath(); cx.moveTo(0,-p.w/2); cx.lineTo(p.w/2,0); cx.lineTo(0,p.w/2); cx.lineTo(-p.w/2,0); cx.closePath(); cx.fill(); }
      cx.restore();
    });
    requestAnimationFrame(tick);
  })();
})();

/* PHOTO GRID + LIGHTBOX */
(function () {
  const IMAGES = {};
  const NAMES = [
    '20e09723c51f41b5bebe1fbda21472c9.jpg',
    '5da360c98b9af0ad709fe18606992229.jpg',
    '712tQUrusKL._AC_UF894,1000_QL80_.jpg',
    'flat,750x,075,f-pad,750x1000,f8f8f8.jpg',
    'HuHCatmeme.jpg.webp',
    'images.jpeg',
    's-l400.jpg'
  ];
  const POSES = [
    [3,   3,  -9, 4],
    [52,  2,   6, 3],
    [1,  40,  -4, 5],
    [30, 28,   8, 2],
    [57, 34,  -7, 6],
    [13, 65,   5, 1],
    [48, 62,  -5, 7],
  ];

  const grid = document.getElementById('photo-grid');
  const lb   = document.getElementById('lightbox');
  const lbImg = document.getElementById('lightbox-img');

  const W = grid.offsetWidth || window.innerWidth;
  const H = grid.offsetHeight || window.innerHeight * 0.65;
  const cardW = Math.min(160, W * 0.36);
  grid.style.setProperty('--card-w', cardW + 'px');

  NAMES.forEach((name, i) => {
    const src  = IMAGES[name] || name;
    const [lp, tp, rot, zi] = POSES[i % POSES.length];
    const tx = (lp / 100) * W;
    const ty = (tp / 100) * H;
    const card = document.createElement('div');
    card.className = 'photo-card';
    card.style.cssText = `--tx:${tx}px;--ty:${ty}px;--rot:${rot}deg;--card-w:${cardW}px;--delay:${i * 0.3}s;left:0;top:0;z-index:${zi};`;
    const img = document.createElement('img');
    img.src = src; img.alt = name;
    card.appendChild(img);
    card.addEventListener('click', () => { lbImg.src = src; openLightbox(); });
    grid.appendChild(card);
  });

  let autoClose;
  function openLightbox() {
    lb.classList.add('open');
    clearTimeout(autoClose);
    autoClose = setTimeout(closeLightbox, 5000);
  }
  function closeLightbox() {
    lb.classList.remove('open');
    clearTimeout(autoClose);
  }

  document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
  lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
})();
</script>
</body>
</html>
